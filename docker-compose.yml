services:
  postgres:
    image: postgres:16-alpine
    container_name: cp_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-citizen_portal}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cp_network

  redis:
    image: redis:7-alpine
    container_name: cp_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cp_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cp_backend
    env_file: .env
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cp_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cp_frontend
    env_file: .env
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cp_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  cp_network:
    driver: bridge
